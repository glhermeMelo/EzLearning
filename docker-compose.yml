services:
  app:
    build: .
    container_name: ezlearning-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=jdbc:postgresql://db:5432/ezlearning
      - DATABASE_USER=ezlearning
      - DATABASE_PASSWORD=ezlearning
      - REDIS_HOST=cache
      - JWT_SECRET=${JWT_SECRET}
      - REASONING_API_URL=${REASONING_API_URL}
      - REASONING_API_KEY=${REASONING_API_KEY}
      - MEDIA_API_URL=${MEDIA_API_URL}
      - MEDIA_API_KEY=${MEDIA_API_KEY}
      - TTS_API_URL=http://tts:8880/v1/audio/speech
      - KROKI_URL=http://kroki:8000
    volumes:
      - app_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
      tts:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: ezlearning-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=ezlearning
      - POSTGRES_USER=ezlearning
      - POSTGRES_PASSWORD=ezlearning
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ezlearning -d ezlearning"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    container_name: ezlearning-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # 🔥 gTTS (Google Text-to-Speech) - Voz pt-BR nativa gratuita
  tts:
    image: python:3.11-slim
    container_name: ezlearning-tts
    working_dir: /app
    volumes:
      - ./edge-tts:/app
    ports:
      - "8880:8880"
    command: >
      sh -c "pip install -r requirements.txt &&
             uvicorn main:app --host 0.0.0.0 --port 8880"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8880/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: ezlearning-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_KEEP_ALIVE=0
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  kroki:
    image: yuzutech/kroki:latest
    container_name: ezlearning-kroki
    ports:
      - "8000:8000"
    environment:
      - KROKI_MERMAID_HOST=kroki-mermaid
    depends_on:
      - kroki-mermaid
    restart: unless-stopped

  kroki-mermaid:
    image: yuzutech/kroki-mermaid:latest
    container_name: ezlearning-kroki-mermaid
    expose:
      - "8002"
    restart: unless-stopped

volumes:
  pgdata:
  ollama_data:
  app_uploads: