server:
  port: 8080

spring:
  application:
    name: ezlearning
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ezlearning}
    username: ${DATABASE_USER:ezlearning}
    password: ${DATABASE_PASSWORD:ezlearning}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      timeout: 2000ms

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration: 3600000
    refresh-expiration: 604800000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  api:
    reasoning:
      url: ${REASONING_API_URL}
      key: ${REASONING_API_KEY}
    media:
      url: ${MEDIA_API_URL}
      key: ${MEDIA_API_KEY}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.ezlearning: DEBUG
